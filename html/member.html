<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourList - 會員中心</title>
    <meta name="description" content="會員專區與統計數據">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header-side {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .header-side.right {
            justify-content: flex-end;
            gap: 10px;
        }

        .member-header .logo {
            flex: 0 0 auto;
            text-align: center;
        }

        .member-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px 30px;
        }

        .member-info {
            text-align: center;
        }

        .member-name {
            font-size: 26px;
            font-weight: normal;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .member-email {
            font-size: 15px;
            color: var(--text-muted);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            margin-top: 24px;
        }

        .stat-card {
            background: var(--input-bg);
            border: 4px solid var(--border-color);
            border-radius: 0;
            padding: 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        .stat-card:hover {
            transform: translateY(2px);
            box-shadow: 0px 0px 0px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .stat-value {
            font-size: 36px;
            font-weight: normal;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .stat-card.thunder:hover {
            border-color: var(--accent-red);
        }

        .stat-card.thunder .stat-value {
            color: var(--accent-red);
        }
    </style>
</head>

<body class="light-mode">
    <div class="background-blur"></div>

    <div class="app-container">
        <header class="member-header">
            <div class="header-side left">
                <button id="back-btn" class="icon-btn" aria-label="返回上一頁" onclick="window.location.href='index.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
            </div>
            <div class="logo">
                <h1 id="member-title">會員<span>管理</span></h1>
            </div>
            <div class="header-side right header-actions">
                <button id="settings-btn" class="icon-btn" aria-label="設定"
                    onclick="window.location.href='settings.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
                <button id="theme-toggle" class="icon-btn" aria-label="切換主題">
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <section class="card member-profile">
            <div class="member-info">
                <div class="member-name">User</div>
                <div class="member-email">user@example.com</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="completed-count">0</div>
                    <div id="label-completed" class="stat-label">完成清單總數</div>
                </div>
                <div class="stat-card thunder">
                    <div class="stat-value" id="thunder-count">0</div>
                    <div id="label-thunder" class="stat-label">踩雷總數</div>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <p id="footer-text">目前網頁正在開發階段，部分功能可能尚不完整。</p>
        </footer>
    </div>

    <script src="../js/member.js"></script>
</body>

</html>
