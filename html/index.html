<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourList - 生活風格清單</title>
    <meta name="description" content="一個優雅的純前端生活風格清單，紀錄您的電影、書籍、音樂與靈感。">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <div class="background-blur"></div>
    
    <div class="app-container">
        <header>
            <div class="logo">
                <h1>Your<span>List</span></h1>
            </div>
            <div class="header-actions">
                <button id="user-btn" class="icon-btn" aria-label="會員中心" onclick="window.location.href='member.html'">
                    <svg id="user-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span id="user-name-badge" class="hidden"></span>
                </button>
                <button id="theme-toggle" class="icon-btn" aria-label="切換主題">
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <section class="add-task-section card">
            <div class="input-group main-input">
                <input type="text" id="task-input" placeholder="來點什麼?" autocomplete="off">
            </div>
            <div class="options-group">
                <div class="option-item">
                    <label for="task-reason">理由 (限 15 字)</label>
                    <input type="text" id="task-reason" placeholder="" maxlength="15" autocomplete="off">
                </div>
                <div class="option-item">
                    <label for="task-tag">標籤</label>
                    <div class="tag-select-wrapper">
                        <select id="task-tag">
                            <option value="影視">🎬 影視</option>
                            <option value="書籍">📖 書籍</option>
                            <option value="音樂">🎵 音樂</option>
                            <option value="課程">🎓 課程</option>
                            <option value="遊戲">🎮 遊戲</option>
                        </select>
                        <button id="add-btn" class="primary-btn">新增清單</button>
                    </div>
                </div>
            </div>
        </section>

        <nav class="filter-section">
            <div class="filter-tabs">
                <button class="filter-btn" data-filter="all">全部</button>
                <button class="filter-btn active" data-filter="active">待辦清單</button>
                <button class="filter-btn" data-filter="completed">完成清單</button>
                <button class="filter-btn" data-filter="thunder">踩雷清單</button>
            </div>
            <div class="stats">
                <span id="items-left">0 項清單</span>
            </div>
        </nav>



        <main id="todo-list" class="todo-list">
            <!-- 任務項目將動態生成於此 -->
            <div class="empty-state">
                <p>目前沒有任務，快新增一個吧！</p>
            </div>
        </main>
    </div>

    <canvas id="animation-canvas"></canvas>
    <script src="../js/script.js"></script>
</body>
</html>
